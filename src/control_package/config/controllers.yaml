controller_manager:
  ros__parameters:
    update_rate: 30
    use_sim_time: false

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

diff_drive_controller:
  ros__parameters:
    left_wheel_names: ["left_wheel_joint"]
    right_wheel_names: ["right_wheel_joint"]
    
    wheel_separation: 0.15 # 15 cm width between wheels (Change as needed)
    wheel_radius: 0.033 # 3.3 cm radius wheels (Change as needed)

    publish_rate: 50.0

    # You are grabbing command velocity from teleop
    use_stamped_vel: false
